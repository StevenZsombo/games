<!DOCTYPE html>

<html>

<head>
  <title>Game by Steven Zs</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Disable scrolling */
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    canvas {
      width: min(177.8vh, 100vw);
      height: min(56.25vw, 100vh);
    }

    @font-face {
      font-family: 'mySerif';
      src: url('zs/fonts/LiberationSerif-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('zs/fonts/LiberationSerif-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('zs/fonts/LiberationSerif-Italic.ttf') format('truetype');
      font-weight: normal;
      font-style: italic;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('zs/fonts/LiberationSerif-BoldItalic.ttf') format('truetype');
      font-weight: bold;
      font-style: italic;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('zs/fonts/Cousine-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('zs/fonts/Cousine-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('zs/fonts/Cousine-Italic.ttf') format('truetype');
      font-weight: normal;
      font-style: italic;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('zs/fonts/Cousine-BoldItalic.ttf') format('truetype');
      font-weight: bold;
      font-style: italic;
    }
  </style>
</head>

<body>
  <canvas id="myCanvas" width="1920" height="1080"></canvas>
  <script>

  </script>
  <script>document.title = "Loading MathJax"; console.time("MathJax")

    const wDiv = (() => {
      const div = document.createElement("div")
      div.style.position = "fixed"
      div.style.width = "80vw"
      div.style.top = "50%"
      div.style.left = "50%"
      div.style.transform = "translate(-50%, -50%)"
      div.style.zIndex = "99999"
      div.style.pointerEvents = "none"
      // div.style.userSelect = "none"
      div.style.fontFamily = "monospace"
      div.style.fontSize = "18px"
      div.style.color = "white"
      div.style.backgroundColor = "midnightblue"
      div.style.padding = "10px"
      div.style.borderRadius = "5px"
      div.style.whiteSpace = "pre-wrap"
      div.style.textAlign = "left"
      document.body.appendChild(div)
      // div.onclick = () => api.hide()

      let stored = ""
      const api = {
        add(txt) { div.textContent += (!div.textContent || div.textContent.endsWith("\n") ? "" : " ") + txt },
        addLine(txt) { div.textContent += "\n" + txt },
        clear() { div.textContent = "" },
        save() { stored = div.textContent },
        load() { div.textContent = stored },
        timePassed() { return (performance.now() / 1000).toFixed(2) },
        remove() { div.remove() },
        show() { div.style.display = "" },
        hide() { div.style.display = "none" },
        toggle() { div.style.display == "" ? div.style.display = "none" : div.style.display = "" },
        error(txt) { api.show(); div.style.backgroundColor = "red", api.addLine(txt) },
        autoShowErrorsSetup() {
          window.onerror = (event, source, lineno, colno, error) => {
            if (!location.hash.includes("noerror"))
              this.error(`ERROR: ${event}, source: ${source}, lineno: ${lineno}, colno: ${colno}, error: ${error}`)
          }
          window.onunhandledrejection = (event) => {
            if (!location.hash.includes("noerror"))
              this.error("UNHANDLED: " + (event.reason?.stack || event.reason))
          }
        }
      }
      api.add("Hi! Please wait patiently for the game to load.\n")
      api.autoShowErrorsSetup()
      api.hide()

      return api
    })()
  </script>
  <script src="zs/tex-svg-full.js" defer></script>
  <script>console.timeEnd("MathJax"); document.title = "Game by Steven Zs"</script>
  <script src="zs/MM.js" defer></script>
  <script src="zs/scripts.js" defer></script>
  <script src="zs/animations.js" defer></script>
  <script src="zs/gui.js" defer></script>
  <script src="zs/sb.js" defer></script>
  <script src="poly/reactor.js" defer></script> <!-- NEEDS Level from stgs -->
  <script src="poly/stgs.js" defer></script> <!-- DEFINES Level, stgs, levels -->
  <script src="zs/gameCore.js" defer></script>
  <script src="poly/game.js" defer></script>
</body>

</html>
