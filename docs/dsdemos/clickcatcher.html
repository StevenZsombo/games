<!DOCTYPE html>
<html>
<head>
    <title>Click Catcher</title>
</head>
<body>
    <canvas id="game" width="600" height="400" style="border:1px solid black; cursor:pointer"></canvas>
    <script>
        const canvas = document.getElementById('game')
        const ctx = canvas.getContext('2d')
        let target = { x: 300, y: 200, r: 30 }
        let score = 0
        
        canvas.addEventListener('click', (e) => {
            let rect = canvas.getBoundingClientRect()
            let x = e.clientX - rect.left
            let y = e.clientY - rect.top
            let dx = x - target.x
            let dy = y - target.y
            if (Math.sqrt(dx*dx + dy*dy) < target.r) {
                score++
                target.x = Math.random() * 600
                target.y = Math.random() * 400
            }
        })
        
        function draw() {
            ctx.fillStyle = '#f0f0f0'
            ctx.fillRect(0, 0, 600, 400)
            
            ctx.fillStyle = 'red'
            ctx.beginPath()
            ctx.arc(target.x, target.y, target.r, 0, Math.PI*2)
            ctx.fill()
            
            ctx.fillStyle = 'black'
            ctx.font = '30px monospace'
            ctx.fillText('Score: ' + score, 10, 50)
            requestAnimationFrame(draw)
        }
        
        draw()
    </script>
</body>
</html>
