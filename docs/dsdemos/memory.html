<!DOCTYPE html>
<html>
<head>
    <title>Memory Match</title>
</head>
<body>
    <canvas id="game" width="400" height="400" style="border:1px solid black; background:#333"></canvas>
    <script>
        const canvas = document.getElementById('game')
        const ctx = canvas.getContext('2d')
        
        // Game state
        let board = []
        let card1 = null
        let card2 = null
        let lock = false
        
        // Create 8 pairs (16 cards)
        const symbols = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H']
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1))
                let temp = arr[i]
                arr[i] = arr[j]
                arr[j] = temp
            }
            return arr
        }
        
        function initGame() {
            let deck = [...symbols, ...symbols]
            deck = shuffle(deck)
            
            board = []
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    board.push({
                        symbol: deck[i * 4 + j],
                        flipped: false,
                        matched: false,
                        x: j,
                        y: i
                    })
                }
            }
            card1 = null
            card2 = null
            lock = false
        }
        
        function getCardAt(x, y) {
            return board.find(c => c.x === x && c.y === y)
        }
        
        function checkMatch() {
            if (card1.symbol === card2.symbol) {
                card1.matched = true
                card2.matched = true
                card1 = null
                card2 = null
            } else {
                lock = true
                setTimeout(() => {
                    card1.flipped = false
                    card2.flipped = false
                    card1 = null
                    card2 = null
                    lock = false
                }, 500)
            }
        }
        
        canvas.onclick = (e) => {
            if (lock) return
            
            let rect = canvas.getBoundingClientRect()
            let x = Math.floor((e.clientX - rect.left) / 100)
            let y = Math.floor((e.clientY - rect.top) / 100)
            
            if (x < 0 || x > 3 || y < 0 || y > 3) return
            
            let card = getCardAt(x, y)
            if (!card || card.matched || card.flipped) return
            
            if (card1 === null) {
                card.flipped = true
                card1 = card
            } else if (card2 === null && card !== card1) {
                card.flipped = true
                card2 = card
                checkMatch()
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, 400, 400)
            
            for (let card of board) {
                let x = card.x * 100
                let y = card.y * 100
                
                if (card.matched || card.flipped) {
                    // Card face up
                    ctx.fillStyle = 'white'
                    ctx.fillRect(x + 5, y + 5, 90, 90)
                    ctx.fillStyle = 'black'
                    ctx.font = 'bold 40px monospace'
                    ctx.textAlign = 'center'
                    ctx.textBaseline = 'middle'
                    ctx.fillText(card.symbol, x + 50, y + 50)
                } else {
                    // Card face down
                    ctx.fillStyle = '#666'
                    ctx.fillRect(x + 5, y + 5, 90, 90)
                    ctx.fillStyle = '#444'
                    ctx.fillRect(x + 10, y + 10, 80, 80)
                }
                
                ctx.strokeStyle = '#000'
                ctx.strokeRect(x + 5, y + 5, 90, 90)
            }
            
            // Check win
            if (board.every(c => c.matched)) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)'
                ctx.fillRect(0, 0, 400, 400)
                ctx.fillStyle = 'white'
                ctx.font = '24px monospace'
                ctx.textAlign = 'center'
                ctx.fillText('YOU WIN!', 200, 200)
                ctx.font = '16px monospace'
                ctx.fillText('Click to restart', 200, 250)
                
                // Restart on click
                canvas.onclick = () => {
                    initGame()
                    canvas.onclick = arguments.callee
                }
            }
            
            requestAnimationFrame(draw)
        }
        
        initGame()
        draw()
    </script>
</body>
</html>
