<!DOCTYPE html>
<html>
<head>
    <title>Snake</title>
</head>
<body>
    <canvas id="game" width="400" height="400" style="border:1px solid black"></canvas>
    <script>
        const canvas = document.getElementById('game')
        const ctx = canvas.getContext('2d')
        const size = 20
        let snake = [{x: 200, y: 200}]
        let food = {x: 100, y: 100}
        let dx = 20, dy = 0
        let score = 0
        
        function update() {
            let head = {x: snake[0].x + dx, y: snake[0].y + dy}
            
            // Wrap around walls
            if (head.x < 0) head.x = 380
            if (head.x >= 400) head.x = 0
            if (head.y < 0) head.y = 380
            if (head.y >= 400) head.y = 0
            
            snake.unshift(head)
            
            if (head.x === food.x && head.y === food.y) {
                score++
                food = {x: Math.floor(Math.random() * 20) * 20, y: Math.floor(Math.random() * 20) * 20}
            } else {
                snake.pop()
            }
            
            // Check collision with self
            if (snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)) {
                snake = [{x: 200, y: 200}]
                dx = 20; dy = 0
                score = 0
            }
        }
        
        function draw() {
            ctx.fillStyle = 'black'
            ctx.fillRect(0, 0, 400, 400)
            
            ctx.fillStyle = 'lime'
            snake.forEach(segment => ctx.fillRect(segment.x, segment.y, size-1, size-1))
            
            ctx.fillStyle = 'red'
            ctx.fillRect(food.x, food.y, size-1, size-1)
            
            ctx.fillStyle = 'white'
            ctx.font = '20px monospace'
            ctx.fillText('Score: ' + score, 10, 30)
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && dy !== 20) { dx = 0; dy = -20 }
            if (e.key === 'ArrowDown' && dy !== -20) { dx = 0; dy = 20 }
            if (e.key === 'ArrowLeft' && dx !== 20) { dx = -20; dy = 0 }
            if (e.key === 'ArrowRight' && dx !== -20) { dx = 20; dy = 0 }
        })
        
        function gameLoop() {
            update()
            draw()
            setTimeout(() => requestAnimationFrame(gameLoop), 100)
        }
        
        gameLoop()
    </script>
</body>
</html>
