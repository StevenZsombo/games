<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
</head>
<body>
    <canvas id="game" width="500" height="400" style="border:1px solid black"></canvas>
    <script>
        const canvas = document.getElementById('game')
        const ctx = canvas.getContext('2d')
        
        let playerScore = 0
        let computerScore = 0
        let result = ''
        let playerChoice = null
        let computerChoice = null
        
        const choices = ['Rock', 'Paper', 'Scissors']
        
        function play(player) {
            playerChoice = player
            computerChoice = choices[Math.floor(Math.random() * 3)]
            
            if (playerChoice === computerChoice) {
                result = 'Tie!'
            } else if (
                (playerChoice === 'Rock' && computerChoice === 'Scissors') ||
                (playerChoice === 'Paper' && computerChoice === 'Rock') ||
                (playerChoice === 'Scissors' && computerChoice === 'Paper')
            ) {
                result = 'You Win!'
                playerScore++
            } else {
                result = 'Computer Wins!'
                computerScore++
            }
        }
        
        canvas.onclick = (e) => {
            let rect = canvas.getBoundingClientRect()
            let x = e.clientX - rect.left
            let y = e.clientY - rect.top
            
            if (y > 300 && y < 360) {
                if (x > 50 && x < 150) play('Rock')
                if (x > 175 && x < 275) play('Paper')
                if (x > 300 && x < 400) play('Scissors')
            }
        }
        
        function draw() {
            ctx.fillStyle = '#f0f0f0'
            ctx.fillRect(0, 0, 500, 400)
            
            ctx.fillStyle = 'black'
            ctx.font = '30px monospace'
            ctx.fillText('Rock Paper Scissors', 100, 50)
            
            ctx.font = '20px monospace'
            ctx.fillText('You: ' + playerScore, 100, 120)
            ctx.fillText('Computer: ' + computerScore, 300, 120)
            
            if (playerChoice) {
                ctx.fillText('You chose: ' + playerChoice, 50, 180)
                ctx.fillText('Computer chose: ' + computerChoice, 50, 220)
                ctx.font = '25px monospace'
                ctx.fillText(result, 200, 280)
            }
            
            ctx.fillStyle = '#ddd'
            ctx.fillRect(50, 300, 100, 60)
            ctx.fillRect(175, 300, 100, 60)
            ctx.fillRect(300, 300, 100, 60)
            
            ctx.fillStyle = 'black'
            ctx.font = '20px monospace'
            ctx.fillText('Rock', 85, 340)
            ctx.fillText('Paper', 210, 340)
            ctx.fillText('Scissors', 330, 340)
            
            requestAnimationFrame(draw)
        }
        
        draw()
    </script>
</body>
</html>
