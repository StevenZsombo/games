<!DOCTYPE html>
<html>
<head>
    <title>2048</title>
</head>
<body>
    <canvas id="game" width="400" height="400" style="border:1px solid black"></canvas>
    <script>
        const canvas = document.getElementById('game')
        const ctx = canvas.getContext('2d')
        let grid = Array(4).fill().map(() => Array(4).fill(0))
        let score = 0
        
        function addRandom() {
            let empty = []
            for (let i = 0; i < 4; i++)
                for (let j = 0; j < 4; j++)
                    if (grid[i][j] === 0) empty.push([i, j])
            if (empty.length) {
                let [x, y] = empty[Math.floor(Math.random() * empty.length)]
                grid[x][y] = Math.random() < 0.9 ? 2 : 4
            }
        }
        
        function move(dx, dy) {
            let moved = false
            for (let i = 0; i < 4; i++) {
                let line = []
                for (let j = 0; j < 4; j++) {
                    let x = dx ? (dx > 0 ? 3 - j : j) : i
                    let y = dy ? (dy > 0 ? 3 - j : j) : i
                    let val = dx ? grid[y][x] : grid[x][y]
                    if (val) line.push(val)
                }
                for (let j = 0; j < line.length - 1; j++) {
                    if (line[j] === line[j + 1]) {
                        line[j] *= 2
                        score += line[j]
                        line.splice(j + 1, 1)
                        moved = true
                    }
                }
                while (line.length < 4) line.push(0)
                for (let j = 0; j < 4; j++) {
                    let x = dx ? (dx > 0 ? 3 - j : j) : i
                    let y = dy ? (dy > 0 ? 3 - j : j) : i
                    let old = dx ? grid[y][x] : grid[x][y]
                    let val = dx ? line[j] : line[j]
                    if (dx) grid[y][x] = line[j]
                    else grid[x][y] = line[j]
                    if (old !== grid[y][x]) moved = true
                }
            }
            if (moved) addRandom()
        }
        
        function draw() {
            ctx.fillStyle = '#bbada0'
            ctx.fillRect(0, 0, 400, 400)
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    let val = grid[i][j]
                    ctx.fillStyle = val ? '#eee4da' : '#cdc1b4'
                    ctx.fillRect(j * 100 + 10, i * 100 + 10, 80, 80)
                    if (val) {
                        ctx.fillStyle = '#776e65'
                        ctx.font = 'bold 30px monospace'
                        ctx.textAlign = 'center'
                        ctx.textBaseline = 'middle'
                        ctx.fillText(val, j * 100 + 50, i * 100 + 50)
                    }
                }
            }
            ctx.fillStyle = 'white'
            ctx.font = '20px monospace'
            ctx.fillText('Score: ' + score, 10, 30)
            requestAnimationFrame(draw)
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move(-1, 0)
            if (e.key === 'ArrowRight') move(1, 0)
            if (e.key === 'ArrowUp') move(0, -1)
            if (e.key === 'ArrowDown') move(0, 1)
        })
        
        addRandom()
        addRandom()
        draw()
    </script>
</body>
</html>
