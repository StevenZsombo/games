<!DOCTYPE html>
<meta charset="UTF-8">
<html>

<head>
  <title>Game by Steven Zs</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Disable scrolling */
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    canvas {
      width: min(177.8vh, 100vw);
      height: min(56.25vw, 100vh);
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('../../zs/fonts/Cousine-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    /* Just use both fonts in a stack - browser handles the rest */
    @font-face {
      font-family: 'mySerif';
      src: url('../../zs/fonts/LiberationSerif-Regular.ttf') format('woff2');
    }

    @font-face {
      font-family: 'mySerif';
      src: url('../shared/animal.woff2') format('woff2');
      /* This tells browser: use this file for emoji ranges only */
      unicode-range: U+1F300-1F9FF, U+2600-26FF, U+2700-27BF;
    }


    @font-face {
      font-family: 'myMonospace';
      src: url('../shared/animal.woff2') format('woff2');
      /* This tells browser: use this file for emoji ranges only */
      unicode-range: U+1F300-1F9FF, U+2600-26FF, U+2700-27BF;
    }
  </style>
</head>

<body>
  <canvas id="myCanvas" width="1920" height="1080"></canvas>
  <script src="../../zs/wdiv.js"></script>
  <script src="../../zs/MM.js" defer></script>
  <script src="../../zs/scripts.js" defer></script>
  <script src="../../zs/animations.js" defer></script>
  <script src="../../zs/gui.js" defer></script>
  <script src=" ../../zs/fsm.js" defer></script>
  <script src=" ../../zs/chat.js" defer></script>
  <script src="../../zs/gameCore.js" defer></script>
  <script src="../shared/editable.js" defer></script>
  <script src="../shared/rules.js" defer></script>
  <script src="../shared/spot.js" defer></script>
  <script src="../shared/gameShared.js" defer></script>
  <script src="server.js" defer></script>
</body>

</html>
