<!DOCTYPE html>
<meta charset="UTF-8">
<html>

<head>
  <title>Game by Steven Zs</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      /* Disable scrolling */
      overflow: hidden;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    canvas {
      width: min(177.8vh, 100vw);
      height: min(56.25vw, 100vh);
    }

    @font-face {
      font-family: 'mySerif';
      src: url('zs/fonts/LiberationSerif-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('zs/fonts/LiberationSerif-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('zs/fonts/LiberationSerif-Italic.ttf') format('truetype');
      font-weight: normal;
      font-style: italic;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('zs/fonts/LiberationSerif-BoldItalic.ttf') format('truetype');
      font-weight: bold;
      font-style: italic;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('zs/fonts/Cousine-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('zs/fonts/Cousine-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('zs/fonts/Cousine-Italic.ttf') format('truetype');
      font-weight: normal;
      font-style: italic;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('zs/fonts/Cousine-BoldItalic.ttf') format('truetype');
      font-weight: bold;
      font-style: italic;
    }
  </style>
</head>

<body>
  <script>
    window.BROWSERshowLoading = document.createElement('div')
    window.BROWSERshowLoading.style.maxWidth = '600px'
    window.BROWSERshowLoading.style.whiteSpace = "pre-line"
    window.BROWSERshowLoading.style.textAlign = 'center'
    window.BROWSERshowLoading.style.position = 'fixed'
    window.BROWSERshowLoading.style.top = '50%'
    window.BROWSERshowLoading.style.left = '50%'
    window.BROWSERshowLoading.style.transform = 'translate(-50%,-50%)'
    window.BROWSERshowLoading.style.fontSize = "20px"
    window.BROWSERshowLoading.style.backgroundColor = "linen"
    // window.BROWSERshowLoading.innerHTML =
    // "Succesfully contacted the server.<br>Please wait while it is loading.<br>Enjoy the game! Best, Steven"
    window.BROWSERshowLoading.textContent = `Contacting server... Success! Loading...\n`
    document.body.appendChild(window.BROWSERshowLoading)
    window.wProgress = (txt) => window.BROWSERshowLoading.textContent += txt + " "
    window.BROWSERshowLoading.clickCount = 0
    window.BROWSERshowLoading.onclick = () => {
      window.BROWSERshowLoading.clickCount++
      if (window.BROWSERshowLoading.clickCount > 5)
        wProgress("Click a bunch more to reset.")
      if (window.BROWSERshowLoading.clickCount > 10) {
        // localStorage.clear()
        window.onbeforeunload = null
        window.location.href = "cc.html?t=" + Date.now() //finally lol
      }
    }
  </script>
  <canvas id="myCanvas" width="1920" height="1080"></canvas>
  <script src="zs/MM.js" defer onload="wProgress('MM.js')"></script>
  <script src="zs/scripts.js" defer onload="wProgress('scripts.js')"></script>
  <script src="zs/animations.js" defer onload="wProgress('animations.js')"></script>
  <script src="zs/gui.js" defer onload="wProgress('animations.js')"></script>
  <script src="zs/chat.js" defer onload="wProgress('chat.js')"></script>
  <script src="zs/gameCore.js" defer onload="wProgress('gameCore.js')"></script>
  <script src="territories.js" defer onload="wProgress('territories.js')"></script>
  <script src="mapster.js" defer onload="wProgress('mapster.js\n')"></script>
  <script src="cc.js" defer onload="wProgress('cc.js')"></script>
</body>

</html>
