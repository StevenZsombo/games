<!DOCTYPE html>
<meta charset="UTF-8">
<html>

<head>
  <title>Game by Steven Zs</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Disable scrolling */
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    canvas {
      /* 16:9 aspect ratio (800/450 = ~1.778) */
      width: min(177.8vh, 100vw);
      /* 16/9 of viewport height */
      height: min(56.25vw, 100vh);
      /* 9/16 of viewport width */
      /*image-rendering: smooth;*/
      /* will override in code anyways*/
      /* AA->noAA being: smooth, auto, crisp-edges, pixelated */
    }


    @font-face {
      font-family: 'mySerif';
      src: url('../zs/fonts/LiberationSerif-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('../zs/fonts/LiberationSerif-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('../zs/fonts/LiberationSerif-Italic.ttf') format('truetype');
      font-weight: normal;
      font-style: italic;
    }

    @font-face {
      font-family: 'mySerif';
      src: url('../zs/fonts/LiberationSerif-BoldItalic.ttf') format('truetype');
      font-weight: bold;
      font-style: italic;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('../zs/fonts/Cousine-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('../zs/fonts/Cousine-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('../zs/fonts/Cousine-Italic.ttf') format('truetype');
      font-weight: normal;
      font-style: italic;
    }

    @font-face {
      font-family: 'myMonospace';
      src: url('../zs/fonts/Cousine-BoldItalic.ttf') format('truetype');
      font-weight: bold;
      font-style: italic;
    }
  </style>
</head>

<body>
  <canvas id="myCanvas" width="1920" height="1080"></canvas>


  <!-- <script src="../zs/tex-svg-full.js"></script> -->
  <script src="../zs/MM.js" defer></script>
  <script src="../zs/scripts.js" defer></script>
  <script src="../zs/animations.js" defer></script>
  <script src="../zs/gui.js" defer></script>
  <!-- <script src="../zs/stgs.js" defer></script> -->
  <script src="../zs/chat.js" defer></script>
  <!-- <script src="../zs/gameCore.js" defer></script> -->
  <script src="platformer.js" defer></script>
  <script src="game.js" defer></script>
</body>

</html>
