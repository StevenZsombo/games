<!DOCTYPE html>
<html>

<head>
    <title>Redirect page</title>
    <script>
        function ___startGame() {
            const password =
                //must be "on" or "off" in the next line
                "on"
            if (password != "on" || prompt("Enter password:") ==
                //change the password in the next line, keep the quotation marks
                "1234"
            ) {
                const page =
                    "./relay/client/client.html"
                const replace = true
                replace ? window.location.replace(page) : (window.location.href = page)
            }
        }
    </script>
</head>

<body>
    <button onclick="___startGame()">Click here to start the game</button>
</body>

</html>
